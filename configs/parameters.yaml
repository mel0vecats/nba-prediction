
# =========================
# DATA SETTINGS
# =========================
data:
  seasons:
    - "2025-26"

  season_types:
    - "Regular Season"
    - "Playoffs"


# =========================
# MODEL SETTINGS
# =========================
models:

  ridge:
    alpha: 1.0

  random_forest:
    n_estimators: 200
    random_state: 42
    n_jobs: -1

  xgboost:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 5
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42

  lightgbm:
    n_estimators: 300
    learning_rate: 0.05
    random_state: 42


# =========================
# PREDICTION SETTINGS
# =========================
prediction:
  season: "2025-26"

  playoff_rounds:
    - "East First Round"
    - "West First Round"
    - "East Conf. Semifinals"
    - "West Conf. Semifinals"
    - "East Conf. Finals"
    - "West Conf. Finals"
    - "NBA Finals"
    - "SoFi Play-In Tournament"
